name: Build APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Process
        run: |
          npm init -y
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest @capacitor/assets
          
          # This line helps us debug: It lists all files in your repo
          ls -R
          
          mkdir -p www
          [ -f "index.html" ] && mv index.html www/
          
          npx cap init "Momentum" "com.harshitnimje.momentum" --web-dir www
          npx cap add android
          
          # Force generate icons from ANY file named icon.png in the repo
          ICON_PATH=$(find . -name "icon.png" | head -n 1)
          if [ -n "$ICON_PATH" ]; then
            echo "Found icon at $ICON_PATH, forcing generation..."
            npx capacitor-assets generate --android --icon "$ICON_PATH"
          else
            echo "ERROR: icon.png not found anywhere in the repository!"
            exit 1 # This will turn the build RED so you know it failed to find the icon
          fi
          
          npx cap sync android
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Momentum-Build-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-build"
          name: "Latest Momentum Build"
          body: "This is the latest automated build of your app."
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
